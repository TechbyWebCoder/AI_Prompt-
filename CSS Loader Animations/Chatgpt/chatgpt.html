<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pure CSS Loader Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --primary: #4f46e5;
      --bg: #0f172a;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 40px;
      max-width: 900px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }

    .loader-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .label {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* ==========================
       SPINNER
    ========================== */
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ==========================
       DOTS
    ========================== */
    .dots {
      display: flex;
      gap: 8px;
    }

    .dots span {
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dots span:nth-child(1) { animation-delay: -0.32s; }
    .dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.3;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ==========================
       BARS
    ========================== */
    .bars {
      display: flex;
      gap: 6px;
      height: 40px;
      align-items: flex-end;
    }

    .bars span {
      width: 6px;
      height: 100%;
      background: var(--primary);
      animation: stretch 1.2s infinite ease-in-out;
    }

    .bars span:nth-child(1) { animation-delay: -1.2s; }
    .bars span:nth-child(2) { animation-delay: -1.1s; }
    .bars span:nth-child(3) { animation-delay: -1.0s; }
    .bars span:nth-child(4) { animation-delay: -0.9s; }

    @keyframes stretch {
      0%, 40%, 100% {
        transform: scaleY(0.3);
        opacity: 0.5;
      }
      20% {
        transform: scaleY(1);
        opacity: 1;
      }
    }

    /* ==========================
       CIRCULAR STROKE
    ========================== */
    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.2);
      border-left-color: var(--primary);
      border-bottom-color: var(--primary);
      animation: rotate 1.3s ease-in-out infinite;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      50% {
        transform: rotate(180deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* ==========================
       PULSE
    ========================== */
    .pulse {
      width: 18px;
      height: 18px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
      100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
    }

    /* ==========================
       DUAL RING
    ========================== */
    .dual-ring {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      position: relative;
    }

    .dual-ring::before,
    .dual-ring::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: var(--primary);
      animation: spin 1.2s linear infinite;
    }

    .dual-ring::after {
      inset: 6px;
      border-top-color: #22d3ee;
      animation-direction: reverse;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="loader-box">
      <div class="spinner"></div>
      <div class="label">Spinner</div>
    </div>

    <div class="loader-box">
      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="label">Dots</div>
    </div>

    <div class="loader-box">
      <div class="bars">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="label">Bars</div>
    </div>

    <div class="loader-box">
      <div class="circle"></div>
      <div class="label">Circular</div>
    </div>

    <div class="loader-box">
      <div class="pulse"></div>
      <div class="label">Pulse</div>
    </div>

    <div class="loader-box">
      <div class="dual-ring"></div>
      <div class="label">Dual Ring</div>
    </div>

  </div>

</body>
</html>
