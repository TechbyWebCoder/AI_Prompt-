<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Animated Loaders Collection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .loader-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }

        .loader-label {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }

        /* Spinner Loader */
        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Dots Loader */
        .dots-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
        }

        .dot {
            width: 16px;
            height: 16px;
            margin: 0 4px;
            background-color: #3498db;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: -0.4s;
        }

        .dot:nth-child(3) {
            animation-delay: -0.8s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* Bars Loader */
        .bars-loader {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 80px;
            height: 80px;
        }

        .bar {
            width: 10px;
            height: 40px;
            margin: 0 2px;
            background-color: #3498db;
            animation: bars 1s infinite ease-in-out;
        }

        .bar:nth-child(1) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(2) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(3) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes bars {
            0%, 100% {
                transform: scaleY(0.5);
            }
            50% {
                transform: scaleY(1.5);
            }
        }

        /* Circular Loader */
        .circular {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .circular::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid transparent;
            border-top-color: #3498db;
            border-bottom-color: #3498db;
            animation: circular-spin 2s linear infinite;
        }

        .circular::after {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 8px solid transparent;
            border-left-color: #3498db;
            border-right-color: #3498db;
            animation: circular-spin 1.5s linear infinite reverse;
        }

        @keyframes circular-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Collection of Pure CSS Animated Loaders</h1>
    <div class="loader-container">
        <div class="loader">
            <div class="spinner"></div>
            <div class="loader-label">Spinner Loader</div>
        </div>
        <div class="loader">
            <div class="dots-loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="loader-label">Dots Loader</div>
        </div>
        <div class="loader">
            <div class="bars-loader">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="loader-label">Bars Loader</div>
        </div>
        <div class="loader">
            <div class="circular"></div>
            <div class="loader-label">Circular Loader</div>
        </div>
    </div>
</body>
</html>
